name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # Job 1 - SAST Security Scan
  sast-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Bandit (SAST Tool)
      run: pip install bandit

    - name: Run Bandit Security Scan
      run: bandit -r app/ -f json -o bandit-report.json || true

    - name: Upload Bandit Report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json

  # Job 2 - Dependency Security Check
  dependency-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Safety
      run: pip install safety

    - name: Run Dependency Check
      run: |
        pip install -r app/requirements.txt
        safety check || true

  # Job 3 - Docker Image Scan
  image-scan:
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-check]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t devsecops-app:latest ./app

    - name: Install Trivy
      run: |
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/download/v0.45.0/trivy_0.45.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.45.0_Linux-64bit.deb

    - name: Run Trivy Image Scan
      run: |
        trivy image --severity HIGH,CRITICAL \
        --format json \
        --output trivy-report.json \
        devsecops-app:latest || true

    - name: Upload Trivy Report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-report
        path: trivy-report.json

  # Job 4 - Build and Deploy
  build-deploy:
    runs-on: ubuntu-latest
    needs: [image-scan]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-app:latest ./app

    - name: Login to DockerHub
      run: |
        echo "${{ secrets.DOCKERHUB_PASSWORD }}" | \
        docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Push to DockerHub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-app:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-app:latest
          docker stop devsecops-app || true
          docker rm devsecops-app || true
          docker run -d \
            --name devsecops-app \
            -p 5000:5000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-app:latest
